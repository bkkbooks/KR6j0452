body:
  text: 淨三業真言唵秫弟引䅶戍引馱曩引野娑嚩二合引賀引二羽蓮花合掌誦前真言七遍加持身心三業妄念諸過悉皆清淨次結普禮一切如來印右膝著地二羽左覆右仰背相著以二信二惠反相叉安於頂上口誦彼真言身住此儀相心想自身滿於法界二佛菩薩前有己身至誠作禮真言唵嚩日囉二合尾微次反短聲多半音如是以三業齊運禮觀一切聖眾及曼茶羅本尊像已即結加趺坐或半加坐澄定身心結佛部三昧耶印二羽芙蓉合掌開手如掬物勢以二定輔於二念上節文側二惠捻二定下第一文即成即念佛部三昧耶真言唵怛他去引𧃯姤引𠺶婆二合嚩引野娑嚩二合賀引以印安於頂上誦真言三遍想印如佛形像次結蓮花部三昧耶印二羽如前合掌微開中間二進二念二定六指微曲頭相去各一寸許二信二惠各并竪如開敷蓮花形誦真言三遍舉印安於頂右右耳之上想如觀自在菩薩蓮花三昧耶真言曰唵鉢納謨二合引納婆二合嚩引野娑嚩二合賀引次結金剛部三昧耶印如前遍禮印安於心上誦真言三遍舉印安於頂左左耳之上想如金剛藏菩薩金剛部三昧耶真言曰唵嚩曰嚧二合引納婆二合嚩引野娑嚩二合引賀引以結護身印二羽右押左內相叉直竪二念頭相柱二定微曲於二念背不令相著如三股杵形二惠并竪掌中押二進二信上即成本經中或用根本印亦得今取蘇悉地經中通法真言即不𫔻護身真言唵薩嚩訥瑟吒二合嚩餉羯囉迦抳矩嚕二合引馱囉乞灑二合囉乞灑二合𤚥引娑嚩二合引賀引由結此印誦前真言加持自身五處先印額次右肩左肩心喉是為五處以真言威力加持自身即成被金剛甲冑次結辟除諸障繫縛毘那夜迦印二羽十度內相叉以屈二惠入掌甲相背各捻二念指面急握拳心想毘那夜迦作障難者皆被五繫縛之辟除真言曰唵度曩尾度曩怛羅二合娑野戍引灑野薩嚩尾曩引野迦引南引吽引撥普未反下同此吒半娑嚩二合引賀引次結被金剛甲冑印即前印以二定直竪頭相柱以二惠各捻二定下第一文即成以印如前加持自身五處遍身自然被金剛鎧甲光明赫奕真言曰唵紇哩二合迦抳野麼娜賀吽引撥吒半音娑嚩二合賀次結金剛牆印即前甲冑印開二定頭相去一寸許開掌如牆形即成真言曰唵紇哩二合迦抳諾賀諾賀鉢左鉢左吽撥吒半音娑嚩二合引賀以印頂上空中右旋三匝兼誦真言三遍以此加持威神力故周匝四方隨心遠近結成金剛牆界界光明照曜一切諸魔不敢輔近次結迎請聖尊印二羽內相叉直竪二定頭柱以二惠向身招之請尊真言曰唵度𩕳婆去誐鑁武點迦𩕳短嚕二合引馱翳𮠴引呬吽引撥吒半音不改此印便誦後真言迎請聖尊者眷屬真言唵娑跛哩嚩引囉麼鼻音反嚩賀野婆去誐鑁武敢反迦𩕳矩嚕二合馱三去麼耶麼努娑麼二合囉娑嚩二合賀引次結都明王忿怒軍吒利印辟除諸魔恐隨聖眾潛隱在其中以明王威神搜棟發遣作障難者唯留聖者及自眷屬其印以二信右押左內相交以二進雙屈並押二信交上以二念直竪頭柱以二定各微曲於二念背後不相著如三股金剛杵形二惠並竪押二進上即成隨誦真言以印空中左旋三匝辟除姦魔棟擇發遣便即右旋三匝結成金剛光明堅固大界一切凡聖不合越此界故違越者化三昧耶決定不安眾聖陰罰違越眾聖言誓故也即誦軍吒利真言曰曩謨引囉怛曩二合怛囉二合夜引野娜莫室戰二合嚩日囉二合播引緊奴雅反曳摩賀藥叉細引曩引鉢多上曳唵阿密㗚二合多軍䋈上里却却佉去引呬佉上同呬聲異反上同底瑟咤二合底瑟姹二合滿馱滿馱賀曩賀曩𧃯惹𧃯惹尾颯普二合引吒野尾颯普二合吒野薩嚩尾近曩二合尾曩引野迦摩賀誐䋈鼻鉢底爾引尾𮧊多嬾反得迦囉引野吽撥吒半音便結上方金剛網印即前牆印以二惠開散直竪即成以印頂上右旋三匝誦真言三遍即成金剛網遍覆其上真言曰唵嚩日囉二合半惹囉吽引撥吒半音次獻閼伽香水浴聖尊印用前迎請印以二惠各捻二定根下第一文以印當心平舒如羸盃形舉印當額奉獻若有香水器即以此印按之加持三遍或一遍然後捧而獻之真言曰唵嚩曰嚕二合娜迦吽引次結寶山印以獨股杵印𮙏上節令平如上頂形以二惠並竪押掌中諸度上即成誦寶山真言曰唵阿左羅吽引次獻蓮花座印即以前閼伽印二惠頭向外開竪相去半寸許如蓮花形真言曰唵嚩日羅二合尾囉引野娑嚩二合引賀引次獻五供養先結塗香印即前獨股杵印以二惠微屈捻二定下第一文相去一寸許即成塗香真言曰唵迦抳矩嚕二合引馱一薩嚩薩怛嚩二合婆去孕迦囉二合囉乞灑二合囉乞灑二合三薩嚩彥𮣺引𩕳娑嚩二合引賀引次結獻花印即前獨股杵印出右惠即成誦獻花真言曰唵迦抳補澁波二合母納婆二合嚩吽引次結燒香印即前獨股印出左惠即成誦燒香真言曰唵迦抳矩嚕二合馱塢𮓌囉二合能上聲瑟吒嚕二合得羯二合吒佩引囉嚩仡哩二合恨拏二合仡哩二合恨拏二合度引奔娑嚩二合引賀次結獻食印準前獨𦙶杵印出二惠及二信頭相柱餘四度內相叉作拳即成真言曰唵迦抳吽引吽引娑嚩二合引賀引次結燈明印即前獨股杵印二惠向身並竪即成誦燈明真言曰唵迦抳儞波儞簸野吽引撥吒半音娑嚩二合引賀引次結普供養印二手合掌右押左叉交上一節即是想從此印流出種種供養雲海化成七寶宮殿樓閣衣服飲食上好天樂充滿法界供養一切聖眾今略舉一二若廣說者一如花嚴經中所說供養即誦是供真言三遍或七遍真言曰唵阿上謨引伽麼抳鉢納麼二合入嚩二合羅鉢囉二合𮧬多上耶吽引暨如上諸供養已以右手輪擲金剛杵誦本真言於眾聖前心想如對至尊作踏舞之勢倣像金剛薩埵於如來前擲弄其杵因便加持自身五處左手執取金剛鈴於額前三度搖振表以天樂音聲供養聖眾令其悅喜亦誦本真言心住薩埵妙三昧地此上用鈴杵二真言及印由來師受密傳不戴於文凡智有限或傳之不盡或領受學者不明置有多種先後著錯不同今故書之以草前𦿔修行者又慮恐承事供養之中或有忘誤疎遺犯三昧耶禁或有多生宿業罪障由未消除誦金剛部百字真言以補前潛滅除諸過得身心清淨與法相應百字真言曰唵嚩日囉二合薩多嚩二合一三去摩野麼鼻努鼻播引攞勒可反野二嚩日囉二合薩多嚩二合三怛㕹二合引努鼻引跛底瑟姹二合四揑哩二合濯引銘婆去嚩五素姤引數沙句反引銘婆去嚩六阿努鼻囉訖姤二合引銘娑嚩七素布引數引准前銘婆嚩八薩嚩悉地淫二合銘鉢囉二合曳延結反蹉倉𭇎反九薩嚩羯磨素左銘十郎多室哩二合藥矩嚕十一吽十二引賀賀賀賀斛引十三娑誐鑁武敢反薩嚩怛他𮓌多十四嚩日囉二合麼鼻音引𭤶引悶左十五嚩曰哩二合引婆嚩十六摩賀引三去麼耶薩多嚩二合惡引十七𭇎各反其印二手右押左外相叉作拳直竪二中指相合此名三昧耶印由結此印加身四處心額喉頂及誦百字真言能除無始已來一切重罪破四重禁五無間業罪謗方等經如是等罪悉皆消滅何況誤失小過而不清淨即結本尊印二手合掌以二無名左安前居下右安後居上押左名指背交指於二中指背後以二頭指各鉤取二名指頭二中指並竪合二大指亦並竪捻二中指中節二小指合竪即成誦根本真言以印加身四處真言曰曩謨引囉怛曩二怛二合野引野曩莫室戰二合拏嚩日囉二合播引拏鼻曳摩賀引藥叉二合細曩鉢多上曳怛儞也二合他去引唵加抳度𩕳吽撥吒半音娑嚩二合賀又結第二根本印即前最初護身印是亦名獨股杵印此與多羅菩薩印同第二根本真言曰曩謨囉怛曩二合夜引野娜莫室戰二合拏嚩日囉二合播引拏鼻曳摩賀引藥叉細引曩引鉢多上曳引怛他也二合他唵度曩尾度曩引迦抳矩嚕二合引馱薩嚩演怛囉二合抳吽引次結頭印即前獨股杵印以二大指各鉤二無名指頭於掌中捻其上節內即成真言曰唵吽引吽引麼麼撥吒次結頂印即前獨股杵印以二大指直竪相柱即成真言曰唵紇哩二合一戰拏迦抳二諾賀鉢左三吽引撥吒娑嚩二合引賀引四次結心印即前根本印安於心上以心真言加持一遍真言曰唵迦𩕳吽撥吒次捧念珠當心以隨心真言加持七遍真言曰唵迦抳度麼鼻吽撥吒半音二手當心持珠念誦身端正坐儼然苦思心住本尊威德妙觀即與畫像如鏡照形不一不異淨無瑕穢外想威光心住慈悲妙觀愍念六道諸類四生輪迴不息我今發猛利勇信之心至誠誦念神妙章句心住本尊瑜伽觀智今我身心既得清淨迴此功德神力加被遍用法界普濟有情蒙此加持皆如我身外若依本經更有十五餘道真言及以印契總合誦習令便精熟待至事相應時棟取用之以備臨事急難補其不足亦非常用具在大經中說此不重敘臨事若要自撿取用之曆應三年七月之比借他筆寫之為令法久住也一交了悉地金剛經嚴五八
